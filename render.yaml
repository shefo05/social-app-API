services:
  - type: web
    name: social-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # Fixed value, not a secret - pinned explicitly here (not left to
      # whatever Render's own default happens to be) so the rate limiter's
      # dev-only exemption has a hard structural backstop that can't
      # silently stop applying if Render's default ever changes.
      - key: NODE_ENV
        value: production
      - key: DB_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DEFAULT_AVATAR_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PHONE_ENCRYPTION_KEY
        sync: false
